<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cut and paste worksheet - Computer parts</title>
  <style>
    :root {
      --ink: #203040;
      --muted: #6c7680;
      --case: #dde7ef;
      --case-dark: #b9c9d6;
      --line: #203040;
      --cpu: #8fd3ff;
      --ram: #93d67f;
      --disk: #c8b4f5;
      --fan: #ffcf66;
      --empty: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #e8edf2;
      color: var(--ink);
      font-family: "Avenir Next", "Segoe UI", Arial, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .sheet {
      width: 297mm;
      height: 210mm;
      padding: 10mm 12mm;
      background: white;
      box-shadow: 0 12px 34px rgba(32, 48, 64, 0.18);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 6mm;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 12mm;
      border-bottom: 1.5px solid #d5dde5;
      padding-bottom: 4mm;
    }

    h1 {
      margin: 0;
      font-size: 18pt;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .name {
      min-width: 72mm;
      padding-bottom: 1.5mm;
      border-bottom: 2px solid var(--ink);
      color: var(--muted);
      font-size: 11pt;
      font-weight: 700;
    }

    .activity {
      display: grid;
      grid-template-columns: 168mm 1fr;
      gap: 9mm;
      min-height: 0;
    }

    .left,
    .right {
      min-height: 0;
      position: relative;
    }

    .right {
      border-left: 2px dashed #9aa8b5;
      padding-left: 8mm;
    }

    .section-title {
      margin: 0 0 2.5mm;
      color: var(--muted);
      font-size: 10pt;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .cut-card {
      padding: 2mm 3mm;
      border: 1.5px solid #d2dbe3;
      border-radius: 5mm;
      background: #fff;
      margin-bottom: 3mm;
      break-inside: avoid;
    }

    .cut-card svg {
      height: auto;
      margin: 0 auto;
    }

    .hard-drive-piece {
      width: 48.825mm;
    }

    .memory-piece {
      width: 12mm;
    }

    .fan-piece {
      width: 22.05mm;
    }

    .label {
      margin-top: 1mm;
      text-align: center;
      font-size: 12pt;
      font-weight: 850;
    }

    .note {
      margin-top: 3mm;
      color: var(--muted);
      font-size: 9.5pt;
      line-height: 1.25;
      font-weight: 650;
    }

    .solid-line {
      stroke: var(--line);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .thin-line {
      stroke: var(--line);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .exact-line {
      stroke: var(--line);
      stroke-width: 0.7875;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .exact-thin-line {
      stroke: var(--line);
      stroke-width: 0.525;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .cut-line {
      fill: none;
      stroke: #374653;
      stroke-width: 1.1;
      stroke-dasharray: 2.2 1.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .slot {
      fill: var(--empty);
      stroke: #374653;
      stroke-width: 3;
      stroke-dasharray: 10 8;
    }

    .slot-text {
      fill: #9aa8b5;
      font-size: 17px;
      font-weight: 850;
      text-anchor: middle;
    }

    .svg-label {
      fill: var(--ink);
      font-size: 17px;
      font-weight: 850;
      text-anchor: middle;
    }

    @page {
      size: A4 landscape;
      margin: 0;
    }

    @media print {
      html,
      body {
        width: 297mm;
        height: 210mm;
        padding: 0;
        background: white;
      }

      .sheet {
        width: 297mm;
        height: 210mm;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main class="sheet">
    <header>
      <h1>Cut and paste the computer parts</h1>
      <div class="name">Name:</div>
    </header>

    <section class="activity" aria-label="Computer cut and paste worksheet">
      <div class="left">
        <p class="section-title">Paste inside the computer case</p>
        <svg viewBox="0 0 640 610" role="img" aria-label="Open computer case with three empty spaces">
          <rect x="54" y="28" width="496" height="556" rx="24" fill="#dbe6ee" class="solid-line"/>
          <rect x="84" y="66" width="410" height="496" rx="18" fill="#f8fbfd" class="thin-line"/>
          <path d="M84 66 L54 28 M494 66 L550 28 M84 562 L54 584 M494 562 L550 584" fill="none" class="solid-line"/>

          <rect x="504" y="106" width="62" height="410" rx="14" fill="#c5d4df" class="solid-line"/>
          <circle cx="535" cy="148" r="16" fill="#ffcf66" class="solid-line"/>
          <line x1="535" y1="137" x2="535" y2="149" class="thin-line"/>
          <path d="M526 154 A13 13 0 1 0 544 154" fill="none" class="thin-line"/>
          <circle cx="523" cy="201" r="8" fill="#69c36f" class="thin-line"/>
          <circle cx="548" cy="201" r="8" fill="#ff7b7b" class="thin-line"/>
          <rect x="520" y="238" width="32" height="96" rx="8" fill="#eef4f8" class="thin-line"/>
          <line x1="526" y1="264" x2="546" y2="264" class="thin-line"/>
          <line x1="526" y1="292" x2="546" y2="292" class="thin-line"/>
          <rect x="520" y="376" width="32" height="86" rx="8" fill="#eef4f8" class="thin-line"/>

          <rect x="124" y="108" width="334" height="430" rx="18" fill="#bfe3cf" stroke="#2d5b43" stroke-width="3"/>
          <rect x="145" y="130" width="292" height="386" rx="12" fill="#d8f0df" stroke="#84ad91" stroke-width="2"/>
          <line x1="158" y1="150" x2="426" y2="150" stroke="#79a988" stroke-width="5"/>
          <line x1="158" y1="492" x2="426" y2="492" stroke="#79a988" stroke-width="5"/>
          <line x1="166" y1="164" x2="166" y2="492" stroke="#79a988" stroke-width="5"/>
          <line x1="424" y1="164" x2="424" y2="492" stroke="#79a988" stroke-width="5"/>

          <path d="M254 214 L254 262 L302 262 L302 310" fill="none" stroke="#77aa88" stroke-width="4"/>
          <path d="M255 214 L326 214 L326 342 L396 342" fill="none" stroke="#77aa88" stroke-width="4"/>
          <path d="M326 214 L326 168 M374 214 L374 168" fill="none" stroke="#77aa88" stroke-width="4"/>
          <path d="M244 364 L244 440 L330 440 L330 486" fill="none" stroke="#77aa88" stroke-width="4"/>
          <path d="M348 274 L402 274 L402 428 L358 428" fill="none" stroke="#77aa88" stroke-width="4"/>

          <rect x="178" y="138" width="132" height="92" rx="12" fill="var(--cpu)" class="thin-line"/>
          <circle cx="244" cy="184" r="42" class="slot"/>
          <text x="244" y="189" class="svg-label">CPU</text>

          <rect x="326" y="130" width="34" height="150" rx="8" fill="var(--ram)" class="thin-line"/>
          <rect x="374" y="130" width="34" height="150" rx="8" fill="var(--ram)" class="thin-line"/>
          <rect x="422" y="130" width="34" height="150" rx="8" class="slot"/>
          <text x="389" y="116" class="svg-label">RAM</text>

          <rect x="176" y="260" width="186" height="88" rx="14" class="slot"/>
          <text x="269" y="310" class="slot-text">hard drive</text>

          <rect x="180" y="380" width="72" height="42" rx="8" fill="#b7cad7" class="thin-line"/>
          <rect x="270" y="380" width="72" height="42" rx="8" fill="#b7cad7" class="thin-line"/>
          <rect x="360" y="380" width="56" height="88" rx="10" fill="#f4e2a3" class="thin-line"/>
          <circle cx="198" cy="478" r="13" fill="#94b8cc" class="thin-line"/>
          <circle cx="238" cy="478" r="13" fill="#94b8cc" class="thin-line"/>
          <rect x="274" y="462" width="68" height="32" rx="7" fill="#94b8cc" class="thin-line"/>
        </svg>
      </div>

      <aside class="right">
        <p class="section-title">Cut out</p>

        <div class="cut-card">
          <svg class="hard-drive-piece" viewBox="0 0 48.825 25" role="img" aria-label="Hard drive to cut out">
            <rect x="0" y="0.95" width="48.825" height="23.1" rx="3.7" fill="var(--disk)" class="exact-line"/>
            <rect x="0" y="0.95" width="48.825" height="23.1" rx="3.7" class="cut-line"/>
            <circle cx="16.6" cy="12.5" r="7.2" fill="#f7f3ff" class="exact-thin-line"/>
            <circle cx="16.6" cy="12.5" r="2.35" fill="#b094ec" class="exact-thin-line"/>
            <rect x="29.8" y="8.1" width="11.7" height="3" rx="1.2" fill="#f7f3ff" class="exact-thin-line"/>
            <rect x="29.8" y="15" width="11.7" height="3" rx="1.2" fill="#f7f3ff" class="exact-thin-line"/>
          </svg>
          <div class="label">Hard drive</div>
        </div>

        <div class="cut-card">
          <svg class="memory-piece" viewBox="0 0 12 39.375" role="img" aria-label="Memory stick to cut out">
            <rect x="2.0375" y="0" width="8.925" height="39.375" rx="2.1" fill="var(--ram)" class="exact-line"/>
            <rect x="2.0375" y="0" width="8.925" height="39.375" rx="2.1" class="cut-line"/>
            <rect x="3.8" y="5" width="5.4" height="4.6" rx="1.1" fill="#eaffdf" class="exact-thin-line"/>
            <rect x="3.8" y="14" width="5.4" height="4.6" rx="1.1" fill="#eaffdf" class="exact-thin-line"/>
            <rect x="3.8" y="23" width="5.4" height="4.6" rx="1.1" fill="#eaffdf" class="exact-thin-line"/>
            <line x1="2.0375" y1="8" x2="0.25" y2="8" class="exact-thin-line"/>
            <line x1="2.0375" y1="17" x2="0.25" y2="17" class="exact-thin-line"/>
            <line x1="2.0375" y1="26" x2="0.25" y2="26" class="exact-thin-line"/>
            <line x1="10.9625" y1="8" x2="11.75" y2="8" class="exact-thin-line"/>
            <line x1="10.9625" y1="17" x2="11.75" y2="17" class="exact-thin-line"/>
            <line x1="10.9625" y1="26" x2="11.75" y2="26" class="exact-thin-line"/>
          </svg>
          <div class="label">Memory</div>
        </div>

        <div class="cut-card">
          <svg class="fan-piece" viewBox="0 0 22.05 22.05" role="img" aria-label="Fan to cut out">
            <circle cx="11.025" cy="11.025" r="11.025" fill="var(--fan)" class="exact-line"/>
            <circle cx="11.025" cy="11.025" r="11.025" class="cut-line"/>
            <circle cx="11.025" cy="11.025" r="2.55" fill="#fff6d8" class="exact-thin-line"/>
            <path d="M11.025 8.48 C16.9 3.35 22.05 5.7 21.05 11.25 C15.7 11.2 13.55 10.3 11.025 8.48Z" fill="#fff0b4" class="exact-thin-line"/>
            <path d="M13.35 11.9 C17.3 19 12.7 22.05 7.95 19.25 C10.55 15.8 12.15 14 13.35 11.9Z" fill="#fff0b4" class="exact-thin-line"/>
            <path d="M8.95 11.95 C1.2 12.5 -1.2 7.1 3.55 3.45 C5.25 7 7.05 9.55 8.95 11.95Z" fill="#fff0b4" class="exact-thin-line"/>
          </svg>
          <div class="label">Fan</div>
        </div>

        <p class="note">Cut out the three parts along the dotted lines, then paste them in the empty spaces inside the computer case.</p>
      </aside>
    </section>
  </main>
</body>
</html>
